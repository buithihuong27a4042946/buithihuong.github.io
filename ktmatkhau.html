<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra mật khẩu</title>
</head>
<body>
    <h2>Chương trình kiểm tra mật khẩu</h2>

    <script>
        function kiemTraMatKhau(password) {
            if (password.length < 8) {
                return "Mật khẩu phải có ít nhất 8 ký tự!";
            }

            if (!/[A-Z]/.test(password)) {
                return "Mật khẩu phải có ít nhất 1 chữ hoa!";
            }

            if (!/[a-z]/.test(password)) {
                return "Mật khẩu phải có ít nhất 1 chữ thường!";
            }

            if (!/[0-9]/.test(password)) {
                return "Mật khẩu phải có ít nhất 1 chữ số!";
            }

            if (!/[@#$%^&*!]/.test(password)) {
                return "Mật khẩu phải có ít nhất 1 ký tự đặc biệt!";
            }

            return "HỢP LỆ";
        }

        let password;
        let ketQua;

        do {
            password = prompt("Nhập mật khẩu:");

            ketQua = kiemTraMatKhau(password);

            if (ketQua !== "HỢP LỆ") {
                alert(ketQua + "\nVui lòng nhập lại!");
            }

        } while (ketQua !== "HỢP LỆ");

        let doManh = "";

        if (password.length === 8) {
            doManh = "Yếu";
        } else if (password.length < 12) {
            doManh = "Trung bình";
        } else {
            doManh = "Mạnh";
        }

        alert("Mật khẩu hợp lệ!\nĐộ mạnh: " + doManh);
    </script>
</body>
</html>
